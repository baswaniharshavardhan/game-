<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Level Devil Style Game V2</title>

<style>

body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

/* GAME WINDOW */

#game {
    width: 960px;
    height: 540px;
    background: #111;
    border: 3px solid white;
    position: relative;
    overflow: hidden;
}

/* PLAYER */

.player {
    width: 32px;
    height: 32px;
    background: #00ff00;
    position: absolute;
}

/* GROUND */

.ground {
    width: 100%;
    height: 40px;
    background: #333;
    position: absolute;
    bottom: 0;
}

/* PLATFORM */

.platform {
    width: 120px;
    height: 20px;
    background: #555;
    position: absolute;
}

/* DISAPPEARING PLATFORM */

.fakePlatform {
    width: 120px;
    height: 20px;
    background: #777;
    position: absolute;
}

/* SPIKES */

.spike {
    width: 32px;
    height: 32px;
    background: red;
    position: absolute;
}

/* DOOR */

.door {
    width: 40px;
    height: 60px;
    background: lime;
    position: absolute;
}

/* TEXT */

#levelText {
    color: white;
    position: absolute;
    top: 10px;
    left: 10px;
}

</style>
</head>

<body>

<div id="game">

<div id="levelText">
Level 1
</div>

<div class="player" id="player"></div>

<div class="ground"></div>

</div>

<script>

const game = document.getElementById("game");
const player = document.getElementById("player");
const levelText = document.getElementById("levelText");

/* PLAYER VARIABLES */

let x = 50;
let y = 40;

let velocityY = 0;
let gravity = 0.6;

let keys = {};

let level = 0;

/* LEVEL DATA */

let levels = [

/* LEVEL 1 */

{
platforms:[
{x:250,y:120}
],

fake:[
{x:450,y:160}
],

spikes:[
{x:600,y:40}
],

door:{x:900,y:40}
},

/* LEVEL 2 */

{
platforms:[
{x:200,y:120},
{x:400,y:180}
],

fake:[
{x:600,y:200}
],

spikes:[
{x:350,y:40},
{x:380,y:40}
],

door:{x:900,y:40}
}

];

/* AUTO GENERATE UNTIL 30 */

while(levels.length < 30){

levels.push({

platforms:[
{x:Math.random()*700,y:120}
],

fake:[
{x:Math.random()*700,y:180}
],

spikes:[
{x:Math.random()*800,y:40}
],

door:{x:900,y:40}

});

}

/* KEYBOARD */

document.addEventListener("keydown", e=>{
keys[e.key]=true;
});

document.addEventListener("keyup", e=>{
keys[e.key]=false;
});

/* LOAD LEVEL */

function loadLevel(){

document
.querySelectorAll(
".platform,.fakePlatform,.spike,.door"
)
.forEach(el=>el.remove());

let data = levels[level];

levelText.innerText =
"Level " + (level+1);

/* NORMAL PLATFORM */

data.platforms.forEach(p=>{

let el =
document.createElement("div");

el.className="platform";

el.style.left=p.x+"px";
el.style.bottom=p.y+"px";

game.appendChild(el);

});

/* FAKE PLATFORM */

data.fake.forEach(p=>{

let el =
document.createElement("div");

el.className="fakePlatform";

el.style.left=p.x+"px";
el.style.bottom=p.y+"px";

game.appendChild(el);

});

/* SPIKES */

data.spikes.forEach(s=>{

let el =
document.createElement("div");

el.className="spike";

el.style.left=s.x+"px";
el.style.bottom=s.y+"px";

game.appendChild(el);

});

/* DOOR */

let door =
document.createElement("div");

door.className="door";

door.style.left=data.door.x+"px";
door.style.bottom=data.door.y+"px";

game.appendChild(door);

}

loadLevel();

/* RESPAWN */

function respawn(){

x = 50;
y = 40;

velocityY = 0;

}

/* GAME LOOP */

function gameLoop(){

if(keys["ArrowLeft"]) x-=4;
if(keys["ArrowRight"]) x+=4;

if(keys[" "] && y<=40){

velocityY=12;

}

/* GRAVITY */

velocityY -= gravity;
y += velocityY;

if(y <= 40){

y = 40;
velocityY = 0;

}

player.style.left = x+"px";
player.style.bottom = y+"px";

/* COLLISION */

let playerRect =
player.getBoundingClientRect();

/* SPIKES */

document.querySelectorAll(".spike")
.forEach(spike=>{

let r =
spike.getBoundingClientRect();

if(
playerRect.left < r.right &&
playerRect.right > r.left &&
playerRect.bottom > r.top &&
playerRect.top < r.bottom
){

respawn();

}

});

/* FAKE PLATFORM DISAPPEAR */

document.querySelectorAll(".fakePlatform")
.forEach(fp=>{

let r =
fp.getBoundingClientRect();

if(
playerRect.left < r.right &&
playerRect.right > r.left &&
playerRect.bottom > r.top &&
playerRect.top < r.bottom
){

fp.style.display="none";

}

});

/* DOOR */

let door =
document.querySelector(".door");

if(door){

let r =
door.getBoundingClientRect();

if(
playerRect.left < r.right &&
playerRect.right > r.left &&
playerRect.bottom > r.top &&
playerRect.top < r.bottom
){

level++;

if(level >= levels.length){

alert("🏆 All Levels Complete!");

level = 0;

}

respawn();
loadLevel();

}

}

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
