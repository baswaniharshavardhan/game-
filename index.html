<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Devil Style Platformer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            background-color: #e0e0e0; /* Light gray background like standard levels */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #333;
        }
        p { margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <p>Use <b>Arrow Keys</b> or <b>WASD</b> to move and jump.</p>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- GAME PHYSICS & PARAMETERS ---
    const gravity = 0.6;
    const friction = 0.8;

    // --- PLAYER OBJECT ---
    const player = {
        x: 50,
        y: 400,
        width: 30,
        height: 30,
        color: "#ff3333", // Red player block
        vx: 0,
        vy: 0,
        speed: 5,
        jumpPower: -12,
        grounded: false
    };

    // --- INPUT HANDLING ---
    const keys = {
        right: false,
        left: false,
        up: false
    };

    window.addEventListener("keydown", (e) => {
        if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
        if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
        if ((e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Space") && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }
    });

    window.addEventListener("keyup", (e) => {
        if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
        if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
    });

    // --- LEVEL DESIGN & "TROLL" MECHANICS ---
    // This is where you create the "Devil" difficulty. 
    // You can add 'trigger' functions that execute when the player gets near.
    const platforms = [
        // Standard floor
        { x: 0, y: 550, width: 800, height: 50, color: "#333333", isSolid: true },
        // Standard platforms
        { x: 150, y: 450, width: 100, height: 20, color: "#333333", isSolid: true },
        { x: 350, y: 350, width: 100, height: 20, color: "#333333", isSolid: true },
        
        // TROLL PLATFORM (The "Level Devil" Mechanic)
        // This platform disappears when the player jumps above it
        { 
            x: 550, y: 250, width: 100, height: 20, color: "#333333", isSolid: true,
            trigger: function(player) {
                // If player gets close to this platform, it turns invisible and non-solid
                if (player.x > 450 && player.y < 300) {
                    this.isSolid = false;
                    this.color = "transparent"; // It vanishes!
                }
            }
        },

        // Goal Door/Area
        { x: 700, y: 500, width: 50, height: 50, color: "#ffcc00", isSolid: false, isGoal: true }
    ];

    // --- GAME LOOP ---
    function update() {
        // 1. Apply Movement Inputs
        if (keys.right) player.vx = player.speed;
        else if (keys.left) player.vx = -player.speed;
        else player.vx *= friction; // Slide to a stop

        // 2. Apply Gravity
        player.vy += gravity;

        // 3. Update Position
        player.x += player.vx;
        player.y += player.vy;

        // 4. Collision Detection
        player.grounded = false;

        for (let i = 0; i < platforms.length; i++) {
            let p = platforms[i];

            // Run platform triggers for "devil" mechanics
            if (p.trigger) p.trigger(player);

            if (!p.isSolid) continue;

            // Simple AABB Collision Detection
            if (player.x < p.x + p.width &&
                player.x + player.width > p.x &&
                player.y < p.y + p.height &&
                player.y + player.height > p.y) {

                // Calculate overlap from all sides
                let dx = (player.x + player.width / 2) - (p.x + p.width / 2);
                let dy = (player.y + player.height / 2) - (p.y + p.height / 2);
                let width = (player.width + p.width) / 2;
                let height = (player.height + p.height) / 2;
                let crossWidth = width * dy;
                let crossHeight = height * dx;

                // Determine which side we collided on
                if (Math.abs(dx) <= width && Math.abs(dy) <= height) {
                    if (crossWidth > crossHeight) {
                        if (crossWidth > (-crossHeight)) {
                            // Top collision (landing on platform)
                            player.y = p.y - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        } else {
                            // Right collision (hitting wall from left)
                            player.x = p.x + p.width;
                            player.vx = 0;
                        }
                    } else {
                        if (crossWidth > -(crossHeight)) {
                            // Left collision (hitting wall from right)
                            player.x = p.x - player.width;
                            player.vx = 0;
                        } else {
                            // Bottom collision (hitting head on ceiling)
                            player.y = p.y + p.height;
                            player.vy = 0;
                        }
                    }
                }
            }
        }

        // Keep player in bounds
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        if (player.y > canvas.height) {
            // Death condition: Reset player
            player.x = 50;
            player.y = 400;
            player.vx = 0;
            player.vy = 0;
            // Reset platforms for retry
            platforms.forEach(p => {
                if (p.trigger) {
                    p.isSolid = true;
                    p.color = "#333333";
                }
            });
        }
    }

    function draw() {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw platforms
        for (let i = 0; i < platforms.length; i++) {
            let p = platforms[i];
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.width, p.height);
        }

        // Draw player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // Start the game
    loop();
</script>

</body>
</html>
